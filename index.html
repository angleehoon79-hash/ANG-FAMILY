<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANG-FAMILY | 积分管理系统 V8.0</title>
    <style>
        :root {
            --primary: #1a73e8; --success: #1e8e3e; --bg: #f8f9fa;
            --card: #ffffff; --text-main: #202124; --border: #dadce0; --gold: #f9ab00;
        }

        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-main); }

        /* 登录与布局基础 */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #fff; }
        .login-card { padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .login-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; margin-top: 15px; }

        #mainPanel { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); transition: 0.3s; }
        h3 { color: var(--primary); font-size: 14px; margin: 0 0 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }

        /* --- 积分系统样式 --- */
        .score-board { text-align: center; padding: 10px 0; }
        .current-score { font-size: 42px; font-weight: bold; color: var(--gold); text-shadow: 0 2px 4px rgba(249,171,0,0.1); }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .score-btn { 
            flex: 1; padding: 10px; border: none; border-radius: 12px; cursor: pointer; 
            font-weight: bold; transition: 0.2s; font-size: 12px;
        }
        .btn-add { background: #e6f4ea; color: var(--success); }
        .btn-add:hover { background: var(--success); color: white; }

        /* AI 宠物增强 */
        .ai-pet-container {
            position: fixed; bottom: 30px; right: 30px;
            background: white; border: 1px solid var(--border);
            padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; z-index: 100; width: 120px;
        }
        .pet-avatar { font-size: 40px; animation: breathing 2s ease-in-out infinite; }
        @keyframes breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .pet-bubble { background: #e8f0fe; font-size: 10px; padding: 5px 10px; border-radius: 10px; margin-top: 10px; text-align: center; color: var(--primary); }

        /* 通用组件 */
        .device { background: #f8f9fa; padding: 8px; border-radius: 8px; font-size: 12px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-screen">
        <div class="login-card">
            <h2 style="color:var(--primary); margin:0;">ANG-FAMILY</h2>
            <span style="font-size:10px; color:var(--success);">🔒 HTTPS SECURE ACCESS</span>
            <input type="text" id="username" placeholder="管理员姓名" style="width:100%; padding:10px; margin-top:20px; border-radius:10px; border:1px solid #ddd;">
            <input type="password" id="password" placeholder="密钥" style="width:100%; padding:10px; margin-top:10px; border-radius:10px; border:1px solid #ddd;">
            <button class="login-btn" onclick="login()">Authenticate</button>
        </div>
    </div>

    <div id="mainPanel">
        <div class="ai-pet-container" id="aiPet">
            <div class="pet-avatar" id="petFace">🤖</div>
            <div class="pet-bubble" id="petTalk">等待指令...</div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0;">Control<span style="color:var(--primary);">::System</span></h2>
            <div id="adminName" style="font-size:12px; color:var(--text-sub);"></div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>🏆 家族积分 | Points Bank</h3>
                <div class="score-board">
                    <div class="current-score" id="scoreVal">0</div>
                    <div style="font-size:11px; color:#888;">Family Contribution Points</div>
                    <div class="btn-group">
                        <button class="score-btn btn-add" onclick="changeScore(10)">+10 分</button>
                        <button class="score-btn btn-add" onclick="changeScore(50)">+50 分</button>
                    </div>
                    <p style="font-size:10px; color:var(--text-sub); margin-top:15px;">* 积分由管理员手动核准发布</p>
                </div>
            </div>

            <div class="card">
                <h3>🎮 竞赛进度 | Minecraft</h3>
                <div style="font-size:11px;">Map: 85%</div>
                <div style="height:6px; background:#f1f3f4; border-radius:3px; margin:5px 0 10px;"><div style="width:85%; height:100%; background:var(--primary);"></div></div>
                <div style="font-size:11px;">Code: 70%</div>
                <div style="height:6px; background:#f1f3f4; border-radius:3px; margin:5px 0 10px;"><div style="width:70%; height:100%; background:var(--primary);"></div></div>
            </div>

            <div class="card">
                <h3>📱 设备监控 | Network Hub</h3>
                <div class="device"><span>Honor Magic 5</span> <span><span class="dot"></span>5G Active</span></div>
                <div class="device"><span>Realme X SuperZoom</span> <span><span class="dot"></span>5G Active</span></div>
            </div>

            <div class="card">
                <h3>🌱 绿豆实验室 | Lab</h3>
                <div style="text-align:center;">
                    <div style="font-size:32px; color:var(--success); font-weight:bold;">1000<small style="font-size:14px;">mm</small></div>
                    <p style="font-size:10px; color:#888;">Current Max Record</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentScore = 0;

        function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const users = { "佳骏": "0526", "爸爸": "8888", "妈妈": "1234" };

            if (users[u] && users[u] === p) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                document.getElementById('adminName').innerText = "Admin: " + u;
            } else {
                alert("密钥验证失败！");
            }
        }

        // 手动加分逻辑
        function changeScore(points) {
            currentScore += points;
            document.getElementById('scoreVal').innerText = currentScore;
            
            // 宠物互动
            const petFace = document.getElementById('petFace');
            const petTalk = document.getElementById('petTalk');
            
            petFace.innerText = "🤩";
            petTalk.innerText = "Wow! 增加了 " + points + " 积分!";
            
            // 1.5秒后恢复原样
            setTimeout(() => {
                petFace.innerText = "🤖";
                petTalk.innerText = "系统运行稳定。";
            }, 1500);
        }
    </script>
</body>
</html>
