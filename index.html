<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANG-FAMILY | 家族树系统</title>
    <style>
        /* 核心变量与背景 - 模仿 Gemini 科技感 */
        :root {
            --gemini-blue: #4285f4;
            --gemini-bg: #0b0d0e;
            --card-blue: #e1f5fe;
            --card-border: #0277bd;
            --text-dark: #1e3a8a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--gemini-bg);
            color: #e8eaed;
            margin: 0;
            overflow-x: hidden;
        }

        /* 登录页面样式 */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1e3a8a 0%, #0b0d0e 100%);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 340px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .ssl-tag {
            font-size: 11px;
            color: #4ade80;
            margin-bottom: 20px;
            display: block;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #3c4043;
            background: #131314;
            color: white;
            box-sizing: border-box;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--gemini-blue);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }

        /* 内部系统样式 */
        #familySystem {
            display: none;
            padding: 60px 20px;
        }

        /* 右上角双语登出按钮 */
        .top-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #8ab4f8;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: rgba(234, 67, 53, 0.2);
            border-color: #f28b82;
            color: #f28b82;
        }

        /* 家族树布局 (像图片一样) */
        .tree-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        .tree-level {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 80px;
            position: relative;
        }

        /* 成员卡片 (模仿 Geni 风格) */
        .member-card {
            display: flex;
            align-items: center;
            background: var(--card-blue);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 12px;
            width: 280px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: #333;
            transition: 0.3s;
        }

        .member-card:hover { transform: translateY(-5px); }

        .avatar {
            width: 60px;
            height: 60px;
            background: #bdbdbd;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            border: 2px solid #fff;
        }

        .member-info {
            margin-left: 15px;
            text-align: left;
            flex: 1;
        }

        .name { font-weight: bold; font-size: 16px; color: var(--text-dark); }
        .meta { font-size: 12px; color: #555; margin-top: 4px; }
        .job { font-size: 11px; color: #0277bd; margin-top: 4px; font-weight: 500; }

        .card-actions {
            position: absolute;
            bottom: 5px;
            right: 12px;
            font-size: 10px;
            color: #0277bd;
        }

        /* 连线设计 */
        .parent-level::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: 50%;
            width: 2px;
            height: 80px;
            background: #555;
        }

        .child-level::before {
            content: '';
            position: absolute;
            top: -40px;
            width: 2px;
            height: 40px;
            background: #555;
            left: 50%;
        }
    </style>
</head>
<body>

    <div id="loginSection" class="login-screen">
        <div class="login-card">
            <h1>ANG-FAMILY</h1>
            <span class="ssl-tag">🔒 HTTPS Secure Connection</span>
            <input type="text" id="username" placeholder="Name | 姓名">
            <input type="password" id="password" placeholder="Key | 密钥">
            <button class="login-btn" onclick="handleLogin()">Login | 进入系统</button>
            <p id="error" style="color: #f28b82; font-size: 12px; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="familySystem">
        <div class="top-nav">
            <button class="logout-btn" onclick="location.reload()">
                <span>🚪</span> Logout | 退出系统
            </button>
        </div>

        <div style="text-align: center;">
            <h2 style="font-weight: 300;">Welcome, <span id="userDisp" style="color: #8ab4f8;"></span></h2>
            <p style="font-size: 12px; color: #888;">Family Tree Database - 管理员: 佳骏</p>
        </div>

        <div class="tree-container">
            <div class="tree-level parent-level">
                <div class="member-card">
                    <div class="avatar">👨</div>
                    <div class="member-info">
                        <div class="name">爸爸 (Father)</div>
                        <div class="meta">Age: -- | Status: Active</div>
                        <div class="job">工程师 (Engineer)</div>
                    </div>
                    <div class="card-actions">edit | tree | more ▾</div>
                </div>
                <div class="member-card">
                    <div class="avatar">👩</div>
                    <div class="member-info">
                        <div class="name">妈妈 (Mother)</div>
                        <div class="meta">Age: -- | Status: Active</div>
                        <div class="job">财务主管 (Finance)</div>
                    </div>
                    <div class="card-actions">edit | tree | more ▾</div>
                </div>
            </div>

            <div class="tree-level child-level">
                <div class="member-card" style="border: 2px solid #8ab4f8;">
                    <div class="avatar">👦</div>
                    <div class="member-info">
                        <div class="name">佳骏 (JiaJun)</div>
                        <div class="meta">Age: 11 | Grade: 5K</div>
                        <div class="job">系统管理员 (Admin)</div>
                    </div>
                    <div class="card-actions">edit | tree | more ▾</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            
            // --- 密码管理区 (佳骏可以在这里修改) ---
            const db = {
                "佳骏": "0526",
                "爸爸": "8888",
                "妈妈": "1234"
            };

            if (db[u] && db[u] === p) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('familySystem').style.display = 'block';
                document.getElementById('userDisp').innerText = u;
            } else {
                document.getElementById('error').innerText = "❌ Verification Failed / 验证失败";
            }
        }
    </script>
</body>
</html>
