<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANG-FAMILY | 终极全能中心 V10.0</title>
    <style>
        /* 动态主题变量 */
        :root {
            --primary: #1a73e8; --success: #1e8e3e; --gold: #f9ab00;
            --bg: #f8f9fa; --card: #ffffff; --text: #202124; --border: #dadce0;
        }

        /* 自动夜间模式 (19:00 - 07:00) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --card: #1e1e1e; --text: #e8eaed; --border: #3c4043;
            }
        }

        body, html { margin: 0; padding: 0; font-family: 'SF Pro', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.5s; }

        /* 布局网格 */
        #mainPanel { padding: 25px; max-width: 1200px; margin: 0 auto; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 24px; padding: 22px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        h3 { color: var(--primary); font-size: 14px; margin: 0 0 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

        /* --- 5K 动态课表 --- */
        .schedule-list { font-size: 13px; line-height: 1.8; }
        .current-day { color: var(--primary); font-weight: bold; background: rgba(26,115,232,0.1); padding: 5px 10px; border-radius: 8px; }

        /* --- AI 猫头鹰进化版 --- */
        .ai-pet-box {
            position: fixed; bottom: 30px; right: 30px; background: var(--card);
            border: 1px solid var(--border); padding: 15px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 140px; text-align: center; z-index: 100;
        }
        .pet-face { font-size: 50px; cursor: pointer; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .pet-msg { font-size: 11px; margin-top: 10px; background: var(--bg); padding: 8px; border-radius: 12px; }

        /* 积分与实验 */
        .big-num { font-size: 40px; font-weight: bold; text-align: center; margin: 10px 0; color: var(--gold); }
        .device { background: var(--bg); padding: 10px; border-radius: 12px; margin-bottom: 8px; font-size: 12px; display: flex; justify-content: space-between; border: 1px solid var(--border); }
        .dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; box-shadow: 0 0 5px var(--success); }

        .btn-action { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="mainPanel">
        <div class="ai-pet-box">
            <div class="pet-face" id="owl" onclick="petInteraction()">🦉</div>
            <div class="pet-msg" id="owlTalk">Hoot! 佳骏管理员，系统已加密。</div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:30px;">
            <div>
                <h1 style="margin:0; font-size: 26px; font-weight: 600;">ANG<span style="color:var(--primary);">::OS</span></h1>
                <div id="dateDisplay" style="font-size:12px; color:var(--success); font-weight: 500;"></div>
            </div>
            <div style="font-size:11px; color:var(--text); opacity:0.6;">巴里文打 (Parit Buntar) 监测站</div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>📅 5K 班动态课表 | Timetable</h3>
                <div class="schedule-list" id="timetable">
                    <div id="dayStatus">正在识别日期...</div>
                    <ul id="subjects" style="padding-left: 20px; margin: 10px 0;">
                        </ul>
                </div>
            </div>

            <div class="card">
                <h3>🏆 家族积分 | Score Bank</h3>
                <div class="big-num" id="scoreVal">0</div>
                <button class="btn-action" onclick="addScore(50)">+50 奖励积分</button>
            </div>

            <div class="card">
                <h3>📱 硬件监控 | 5G Hub</h3>
                <div class="device"><span>Honor Magic 5 (爸爸)</span> <span><span class="dot"></span> 5G</span></div>
                <div class="device"><span>Realme X SuperZoom</span> <span><span class="dot"></span> Online</span></div>
                <div class="device"><span>Samsung Buds FE</span> <span style="opacity:0.5;">Standby</span></div>
            </div>

            <div class="card">
                <h3>🌱 绿豆生长日志 | Lab</h3>
                <div class="big-num" style="color:var(--success);">1000<small style="font-size:16px;">mm</small></div>
                <div style="font-size:11px; text-align:center; opacity:0.8;">生长曲线：稳定向上 | 准备移栽</div>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        const owl = document.getElementById('owl');
        const owlTalk = document.getElementById('owlTalk');

        // 1. 初始化日期与课表
        function initSystem() {
            const now = new Date();
            const days = ["星期日 (Sunday)", "星期一 (Monday)", "星期二 (Tuesday)", "星期三 (Wednesday)", "星期四 (Thursday)", "星期五 (Friday)", "星期六 (Saturday)"];
            const dayIdx = now.getDay();
            
            document.getElementById('dateDisplay').innerText = "🔒 HTTPS SECURE | " + days[dayIdx];
            
            const dayStatus = document.getElementById('dayStatus');
            const subjects = document.getElementById('subjects');

            if (dayIdx === 0 || dayIdx === 6) {
                dayStatus.innerHTML = "<span class='current-day'>周末愉快！</span>";
                subjects.innerHTML = "<li>准备下周 5K 班课本</li><li>复习 Minecraft 竞赛逻辑</li>";
                owlTalk.innerText = "Hoot! 周末是休息和玩 Minecraft 的好时间！";
            } else {
                dayStatus.innerHTML = "<span class='current-day'>今日课程进行中</span>";
                subjects.innerHTML = "<li>RBT (设计与工艺)</li><li>科学 (Mung Bean)</li><li>华文作文</li>";
                owlTalk.innerText = "佳骏，记得检查你的 5K 班作业哦！";
            }
        }

        // 2. 积分逻辑
        function addScore(p) {
            score += p;
            document.getElementById('scoreVal').innerText = score;
            owl.innerText = "🤩";
            owlTalk.innerText = "太棒了！积分增加了 " + p + "！";
            setTimeout(() => { owl.innerText = "🦉"; }, 1500);
        }

        // 3. 猫头鹰互动
        function petInteraction() {
            const faces = ["😉", "😎", "🦉", "🤔"];
            const msgs = ["5G 信号满格！", "绿豆还在长高吗？", "我是你的智慧守护者。", "今天的心情是 100 分！"];
            const rand = Math.floor(Math.random() * faces.length);
            owl.innerText = faces[rand];
            owlTalk.innerText = msgs[rand];
            setTimeout(() => { owl.innerText = "🦉"; }, 2000);
        }

        // 自动运行
        initSystem();
    </script>
</body>
</html>
