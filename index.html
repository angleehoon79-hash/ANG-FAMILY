<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANG-FAMILY | 家族树系统</title>
    <style>
        /* 全局样式 - 保持专业且简洁 */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; }
        
       
        /* 家族树模块 (模仿图片风格) */
        #familyTreeSection { display: none; padding: 40px 10%; text-align: center; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 20px; }
        
        /* 核心布局：Family Tree Layout (CSS Grid/Flex) */
        .tree-container { margin-top: 40px; position: relative; }
        
        /* 每一层 (Level) 的通用容器 */
        .tree-level { display: flex; justify-content: center; gap: 40px; margin-bottom: 60px; position: relative; }
        
        /* 卡片 (模仿图片布局) */
        .member-card {
            display: flex;
            align-items: center;
            background: #e1f5fe; /* 图片同款浅蓝 */
            border: 1px solid #0277bd;
            border-radius: 6px;
            padding: 8px 12px;
            width: 260px; /* 固定宽度，像图片一样 */
            position: relative;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
        }
        .member-card:hover { transform: scale(1.03); box-shadow: 4px 4px 10px rgba(0,0,0,0.15); }

        /* 左侧头像区域 */
        .avatar {
            width: 50px;
            height: 50px;
            background: #bdbdbd;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            border: 2px solid #81d4fa;
        }

        /* 右侧信息区域 */
        .member-info { flex: 1; margin-left: 10px; text-align: left; }
        .name { font-weight: bold; font-size: 15px; color: #1e3a8a; }
        .meta { font-size: 11px; color: #666; margin-top: 3px; }
        .motto { font-size: 11px; color: #333; margin-top: 5px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; }

        /* 底部互动按钮 (模仿图片) */
        .card-actions { font-size: 11px; color: #0277bd; position: absolute; bottom: 3px; right: 10px; }

        /* 黑色连接线逻辑 - 使用伪元素 (::after) 画横平竖直的线 */
        .parent-level { position: relative; }
        
        /* 父母与子女之间的垂直主线 */
        .parent-level::after {
            content: '';
            position: absolute;
            bottom: -60px; /* 连接下一层 */
            left: 50%;
            height: 60px;
            width: 2px;
            background: #333;
        }

        /* 子女层的水平主线 */
        .child-level { position: relative; margin-top: 60px; }
        .child-level::before {
            content: '';
            position: absolute;
            top: -20px; /* 主线高度 */
            left: 150px; /* 手动计算左侧起始点 (自己卡片的一半 + 间隔的一半) */
            right: 150px; /* 手动计算右侧起始点 */
            height: 2px;
            background: #333;
        }
        
        /* 每个人卡片到水平主线的垂直小线 */
        .member-card::after {
            content: '';
            position: absolute;
            top: -20px; /* 连接到水平主线 */
            left: 50%;
            height: 20px;
            width: 2px;
            background: #333;
        }
    </style>
</head>
<body>

    <div id="loginSection" class="login-screen">
        <div class="login-card">
            <h1>ANG-FAMILY</h1>
            <span class="ssl-tag">🔒 HTTPS 端到端加密连接 · 已就绪</span>
            <input type="text" id="username" placeholder="成员姓名">
            <input type="password" id="password" placeholder="访问密钥">
            <button class="login-btn" onclick="login()">验证并解锁家族树</button>
            <p id="errorMsg" style="color: #ff4d4d; font-size: 12px; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="familyTreeSection">
        <div class="dashboard-header">
            <h2 style="font-weight: 300;">你好，<span id="currentUser" style="color: #3b82f6;"></span></h2>
            <div>
                <span class="ssl-tag">🔒 连接安全 (HTTPS)</span>
                <button onclick="location.reload()" style="background: none; border: 1px solid #ddd; padding: 5px 10px; border-radius: 5px; font-size: 11px; margin-left: 10px;">注销</button>
            </div>
        </div>

        <div class="tree-container">
            <div class="tree-level parent-level">
                <div class="member-card">
                    <div class="avatar">👨</div>
                    <div class="member-info">
                        <div class="name">爸爸</div>
                        <div class="meta">年龄: -- | 职业: 工程师</div>
                        <div class="motto">“维护 Honor 与 Realme 设备安全监控中。”</div>
                    </div>
                    <div class="card-actions">编辑 | 树 | 更多 ▾</div>
                </div>
                
                <div class="member-card">
                    <div class="avatar">👩</div>
                    <div class="member-info">
                        <div class="name">妈妈</div>
                        <div class="meta">年龄: -- | 职业: 财务主管</div>
                        <div class="motto">“重要日程与绿豆实验记录已同步。”</div>
                    </div>
                    <div class="card-actions">编辑 | 树 | 更多 ▾</div>
                </div>
            </div>

            <div class="tree-level child-level">
                <div class="member-card">
                    <div class="avatar">👦</div>
                    <div class="member-info">
                        <div class="name">佳骏 (管理员)</div>
                        <div class="meta">年龄: -- | 职业: 5K班学生 / 系统管理员</div>
                        <div class="motto">“负责 ANG-FAMILY 系统维护与 Minecraft 资料管理。”</div>
                    </div>
                    <div class="card-actions">编辑 | 树 | 更多 ▾</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const err = document.getElementById('errorMsg');
            
            // 全家人的独立账号和密码（请自行修改秘密数字）
            const accounts = {
                "佳骏": "0526",
                "爸爸": "8888",
                "妈妈": "1234"
            };

            if (accounts[u] && accounts[u] === p) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('familyTreeSection').style.display = 'block';
                document.getElementById('currentUser').innerText = u + " (洪家人)";
            } else {
                err.innerText = "❌ 身份验证失败，请核对姓名或密码。";
            }
        }
    </script>
</body>
</html>
